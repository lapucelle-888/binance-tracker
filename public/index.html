<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binance Tracker</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background:#0b0e11; color:#eaecef; margin:0; padding:12px; }
    h1 { font-size:17px; margin:14px 0 6px; }
    .muted { color:#848e9c; font-weight:400; font-size:13px; }
    .apphead { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .apphead h1 { margin:6px 0; }
    .bellbtn { background:#1e2329; border:1px solid #2b3139; color:#eaecef; border-radius:8px; padding:8px 11px; font-size:16px; cursor:pointer; flex-shrink:0; }
    .bellbtn:active { background:#2b3139; }
    .top { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .box { background:#1e2329; border-radius:12px; padding:10px 12px; flex:1; min-width:100px; }
    .box .label { font-size:12px; color:#848e9c; }
    .box .val { font-size:17px; font-weight:600; margin-top:3px; }
    input { width:100%; box-sizing:border-box; background:#0b0e11; border:1px solid #2b3139; color:#eaecef; border-radius:8px; padding:10px; font-size:15px; margin-top:5px; }
    .field { margin-top:7px; }
    .field label { font-size:12px; color:#848e9c; }
    .half { display:flex; gap:8px; }
    .half .field { flex:1; }
    .btns { display:flex; gap:8px; margin-top:10px; }
    .btn { flex:1; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:700; color:#fff; }
    .btn.long { background:#2ebd85; }
    .btn.short { background:#f6465d; }
    .mtoggle { background:#2b3139; color:#b7bdc6; padding:10px; }
    .mtoggle.active { background:#f0b90b; color:#0b0e11; }
    #orderStatus { font-size:13px; margin-top:9px; min-height:16px; }
    .poshead { display:flex; justify-content:space-between; align-items:center; }
    .closeall { background:#f6465d; color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:700; }
    .pos { background:#1e2329; border-radius:12px; padding:11px 13px; margin-bottom:9px; }
    .pos .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
    .sym { font-size:15px; font-weight:700; }
    .tag { font-size:12px; font-weight:700; padding:2px 8px; border-radius:6px; }
    .long-tag { background:#0e3b2e; color:#2ebd85; }
    .short-tag { background:#3b1414; color:#f6465d; }
    .row { display:flex; justify-content:space-between; font-size:13px; padding:2px 0; color:#b7bdc6; }
    .row span:last-child { color:#eaecef; font-weight:500; }
    .green { color:#2ebd85; } .red { color:#f6465d; }
    .closebtn { margin-top:9px; width:100%; background:#2b3139; color:#eaecef; border:none; border-radius:8px; padding:10px; font-size:13px; font-weight:600; }
    .hedge-toggle { display:flex; justify-content:space-between; align-items:center; background:#1a1f26; border:1px solid #2b3139; border-radius:10px; padding:10px 14px; margin-top:10px; cursor:pointer; user-select:none; }
    .hedge-toggle.on { border-color:#f0b90b; background:#241f0a; }
    .hedge-label { display:flex; flex-direction:column; gap:2px; }
    .hedge-title { font-size:14px; font-weight:700; }
    .hedge-state { font-size:11px; font-weight:700; color:#848e9c; letter-spacing:.5px; }
    .hedge-toggle.on .hedge-state { color:#f0b90b; }
    .switch { width:48px; height:28px; border-radius:999px; background:#2b3139; position:relative; transition:background .2s; flex-shrink:0; }
    .hedge-toggle.on .switch { background:#f0b90b; }
    .knob { position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:left .2s; }
    .hedge-toggle.on .knob { left:23px; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); display:none; align-items:center; justify-content:center; padding:20px; z-index:100; }
    .overlay.show { display:flex; }
    .modal { background:#1e2329; border:1px solid #2b3139; border-radius:14px; padding:18px; width:100%; max-width:360px; box-shadow:0 10px 40px rgba(0,0,0,.5); }
    .modal-title { font-size:16px; font-weight:700; margin-bottom:12px; }
    .mrow { display:flex; justify-content:space-between; font-size:14px; padding:7px 0; border-bottom:1px solid #2b3139; color:#848e9c; }
    .mrow:last-child { border-bottom:none; }
    .mrow span:last-child { color:#eaecef; font-weight:600; }
    .modal-btns { display:flex; gap:10px; margin-top:16px; }
    .modal-btn { flex:1; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:700; color:#fff; cursor:pointer; }
    .modal-btn.long { background:#2ebd85; }
    .modal-btn.short { background:#f6465d; }
    .modal-cancel { background:#2b3139; color:#eaecef; }
    #loginOverlay { position:fixed; inset:0; background:#0b0e11; display:none; align-items:center; justify-content:center; padding:24px; z-index:1000; }
    #loginOverlay.show { display:flex; }
    .login-card { background:#1e2329; border:1px solid #2b3139; border-radius:14px; padding:22px; width:100%; max-width:320px; text-align:center; }
    .login-card h2 { font-size:18px; margin:0 0 4px; }
    .login-card p { font-size:12px; color:#848e9c; margin:0 0 16px; }
    .login-card input { text-align:center; letter-spacing:3px; }
    .login-card button { width:100%; margin-top:12px; background:#f0b90b; color:#0b0e11; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; }
    #loginErr { color:#f6465d; font-size:12px; min-height:16px; margin-top:8px; }
    .lockbtn { background:#1e2329; border:1px solid #2b3139; color:#eaecef; border-radius:8px; padding:8px 11px; font-size:16px; cursor:pointer; flex-shrink:0; }
    .lockbtn:active { background:#2b3139; }
    .tabbar { display:flex; align-items:center; gap:18px; border-bottom:1px solid #2b3139; margin:16px 0 10px; }
    .tab { background:none; border:none; color:#848e9c; font-size:16px; font-weight:700; padding:6px 0 9px; position:relative; cursor:pointer; }
    .tab.active { color:#eaecef; }
    .tab.active::after { content:""; position:absolute; left:0; right:0; bottom:-1px; height:3px; border-radius:2px; background:#f0b90b; }
    .tabbar .closeall { margin-left:auto; }
    .selectwrap { position:relative; }
    .selectwrap::after { content:"▾"; position:absolute; right:12px; top:62%; transform:translateY(-50%); color:#848e9c; pointer-events:none; font-size:12px; }
    select { width:100%; box-sizing:border-box; background:#0b0e11; border:1px solid #2b3139; color:#eaecef; border-radius:8px; padding:10px; font-size:15px; margin-top:5px; -webkit-appearance:none; appearance:none; }
    .yellow { color:#f0b90b; }
    .stoprow { display:flex; gap:6px; margin-top:9px; }
    .stopinput { flex:1; width:auto; min-width:0; margin-top:0; padding:9px 10px; font-size:13px; }
    .stopbtn { border:none; border-radius:8px; padding:9px 12px; font-size:13px; font-weight:700; color:#fff; cursor:pointer; white-space:nowrap; }
    .stopbtn.tp { background:#2ebd85; }
    .stopbtn.sl { background:#f6465d; }

    .partialrow { display:flex; gap:6px; margin-top:9px; }
    .pbtn { flex:1; background:#2b3139; color:#eaecef; border:none; border-radius:8px; padding:9px; font-size:12px; font-weight:600; cursor:pointer; }
    .pbtn:active { background:#3a424d; }

    .live { color: #ff4d4d; font-weight: bold; font-size: 0.6em; vertical-align: middle; }

  </style>
</head>
<body>
  <div id="loginOverlay" class="show">
    <div class="login-card">
      <h2>🔒 Locked</h2>
      <p>Enter password to access your tracker</p>
      <input id="loginPw" type="password" placeholder="Password"
             onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password" />
      <button onclick="doLogin()">Unlock</button>
      <div id="loginErr"></div>
    </div>
  </div>
  <div class="apphead">
    <h1>💰 Binance Futures Tracker <span class="live">● LIVE</span></h1>
    <div style="display:flex; gap:8px;">
      <button class="bellbtn" onclick="testTelegram()" title="Test Telegram">🔔</button>
      <button class="lockbtn" onclick="lockApp()" title="Lock app">🔒</button>
    </div>
  </div>
  <div class="top">
    <div class="box"><div class="label">Margin Balance</div><div class="val" id="margin">—</div></div>
    <div class="box"><div class="label">Unrealized PNL</div><div class="val" id="upnl">—</div></div>
    <div class="box"><div class="label">Available</div><div class="val" id="avail">—</div></div>
  </div>

  <h1>Open Position</h1>
  <div class="box" style="display:block;">
    <div class="field"><label>Symbol</label><input id="symbol" value="BTCUSDT" oninput="refreshSymPrice()" onchange="syncMarginType()" /></div>
    <div class="muted" id="symPrice" onclick="fillLimitFromPrice()" style="margin-top:5px; font-size:12px; cursor:pointer;">Mark: —</div>
    <div class="half">
      <div class="field">
        <label>Order Type</label>
        <div class="selectwrap">
          <select id="orderTypeSel" onchange="setOrderType(this.value)">
            <option value="MARKET">Market</option>
            <option value="LIMIT">Limit</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Margin Type</label>
        <div class="selectwrap">
          <select id="marginSel" onchange="setMargin(this.value)">
            <option value="CROSSED">Cross</option>
            <option value="ISOLATED">Isolated</option>
          </select>
        </div>
      </div>
    </div>
    <div class="field" id="limitPriceField" style="display:none;">
      <label>Limit Price</label>
      <input id="limitPrice" placeholder="e.g. 70.00" />
    </div>

    <div class="half">
      <div class="field"><label>Margin (USDT)</label><input id="usdt" value="10" /></div>
      <div class="field"><label>Leverage (x)</label><input id="lev" value="20" /></div>
    </div>
    <div class="half">
      <div class="field"><label>Take Profit (% price)</label><input id="tp" placeholder="e.g. 5" /></div>
      <div class="field"><label>Stop Loss (% price)</label><input id="sl" placeholder="e.g. 3" /></div>
    </div>

    <div class="hedge-toggle" id="hedgeToggle" onclick="toggleHedge()">
      <div class="hedge-label">
        <span class="hedge-title">Hedge Mode</span>
        <span class="hedge-state" id="hedgeState">OFF · One-way</span>
      </div>
      <div class="switch"><div class="knob"></div></div>
    </div>

    <div class="btns">
      <button class="btn long" onclick="openPosisi('BUY')">LONG</button>
      <button class="btn short" onclick="openPosisi('SELL')">SHORT</button>
    </div>
    <div id="orderStatus" class="muted"></div>
  </div>

  <div class="tabbar">
    <button class="tab active" id="tabPositions" onclick="switchTab('positions')">Positions (<span id="posCount">0</span>)</button>
    <button class="tab" id="tabOrders" onclick="switchTab('orders')">Open Orders (<span id="ordCount">0</span>)</button>
    <button class="closeall" id="closeAllBtn" onclick="closeAll()">Close All</button>
    <button class="closeall" id="cancelAllBtn" onclick="cancelAllOrders()" style="display:none;">Cancel All</button>
  </div>

  <div id="positions"><p class="muted">loading...</p></div>
  <div id="orders" style="display:none;"><p class="muted">loading...</p></div>

  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Confirm</div>
      <div id="modalBody"></div>
      <div class="modal-btns">
        <button class="modal-btn modal-cancel" onclick="modalAnswer(false)">Cancel</button>
        <button class="modal-btn long" id="modalConfirm" onclick="modalAnswer(true)">Confirm</button>
      </div>
    </div>
  </div>
  <script>
    // ===== AUTH / LOGIN GATE =====
    const _origFetch = window.fetch.bind(window);
    window.fetch = function (url, options = {}) {
      const isApi = typeof url === "string" && url.startsWith("/api/") && url !== "/api/login";
      if (isApi) {
        options.headers = Object.assign({}, options.headers, {
          "X-App-Token": sessionStorage.getItem("appToken") || "",
        });
      }
      return _origFetch(url, options).then((res) => {
        if (isApi && res.status === 401) showLogin(); // token mati / gak ada → balik ke login
        return res;
      });
    };

    function showLogin() {
      document.getElementById("loginOverlay").classList.add("show");
    }
    function lockApp() {
      sessionStorage.removeItem("appToken");
      showLogin();
    }
    async function doLogin() {
      const pw = document.getElementById("loginPw").value;
      const errEl = document.getElementById("loginErr");
      errEl.textContent = "";
      try {
        const res = await _origFetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw }),
        });
        const d = await res.json();
        if (d.ok && d.token) {
          sessionStorage.setItem("appToken", d.token);
          document.getElementById("loginPw").value = "";
          startApp();
        } else {
          errEl.textContent = d.error || "Login failed";
        }
      } catch (e) {
        errEl.textContent = e.message;
      }
    }
    // ===== END AUTH =====
    let hedgeOn = false;
    let modalResolve = null;

    function fmt(n, d = 2) {
      return Number(n).toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
    }
    function warna(n) { return Number(n) >= 0 ? "green" : "red"; }
    function setStatus(txt, cls) {
      const s = document.getElementById("orderStatus");
      s.textContent = txt; s.className = cls;
    }

    function customConfirm({ title, bodyHtml, confirmText, confirmClass }) {
      return new Promise(resolve => {
        modalResolve = resolve;
        document.getElementById("modalTitle").textContent = title;
        document.getElementById("modalBody").innerHTML = bodyHtml || "";
        const btn = document.getElementById("modalConfirm");
        btn.textContent = confirmText || "Confirm";
        btn.className = "modal-btn " + (confirmClass || "long");
        document.getElementById("modalOverlay").classList.add("show");
      });
    }
    function modalAnswer(ok) {
      document.getElementById("modalOverlay").classList.remove("show");
      if (modalResolve) { modalResolve(ok); modalResolve = null; }
    }

    function applyMode(hedge) {
      hedgeOn = hedge;
      document.getElementById("hedgeToggle").classList.toggle("on", hedge);
      document.getElementById("hedgeState").textContent = hedge ? "ON · Hedge" : "OFF · One-way";
    }
    
    let orderType = "MARKET";
    function setOrderType(t) {
      orderType = t;
      document.getElementById("limitPriceField").style.display = t === "LIMIT" ? "" : "none";
    }

    async function refreshSymPrice() {
      const sym = document.getElementById("symbol").value.trim().toUpperCase();
      const el = document.getElementById("symPrice");
      if (!sym || !el) return;
      try {
        const res = await fetch("/api/price?symbol=" + sym);
        const d = await res.json();
        if (d.price) {
          const px = Number(d.price);
          el.dataset.price = d.price;
          const disp = px >= 1 ? fmt(px) : String(px);
          el.innerHTML = "Mark: <b style='color:#eaecef'>" + disp + "</b> <span style='color:#f0b90b'>· tap to fill limit</span>";
        } else {
          el.textContent = "Mark: —";
        }
      } catch (e) {}
    }

    function fillLimitFromPrice() {
      const el = document.getElementById("symPrice");
      const px = el && el.dataset ? el.dataset.price : "";
      if (!px) return;
      if (orderType !== "LIMIT") {
        setOrderType("LIMIT");
        document.getElementById("orderTypeSel").value = "LIMIT";
      }
      document.getElementById("limitPrice").value = px;
    }

    function switchTab(name) {
      const isPos = name === "positions";
      document.getElementById("tabPositions").classList.toggle("active", isPos);
      document.getElementById("tabOrders").classList.toggle("active", !isPos);
      document.getElementById("positions").style.display = isPos ? "" : "none";
      document.getElementById("orders").style.display = isPos ? "none" : "";
      document.getElementById("closeAllBtn").style.display = isPos ? "" : "none";
      document.getElementById("cancelAllBtn").style.display = isPos ? "none" : "";
    }


    function warnaRatio(r) {
      if (r == null) return "";
      if (r >= 80) return "red";
      if (r >= 40) return "yellow";
      return "green";
    }


    function toggleHedge() { setMode(!hedgeOn); }

    async function loadMode() {
      try {
        const res = await fetch("/api/mode");
        const d = await res.json();
        if (typeof d.dualSidePosition === "boolean") applyMode(d.dualSidePosition);
      } catch (e) {}
    }

    async function setMode(hedge) {
      setStatus(hedge ? "Switching to Hedge..." : "Switching to One-way...", "muted");
      try {
        const res = await fetch("/api/mode", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ hedge }),
        });
        const d = await res.json();
        const ok = d.code === 200 || (d.msg && d.msg.toLowerCase().includes("no need"));
        if (ok) {
          applyMode(hedge);
          setStatus("✅ Mode: " + (hedge ? "Hedge" : "One-way"), "green");
        } else {
          setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function setMargin(type) {
      const symbol = document.getElementById("symbol").value.trim().toUpperCase();
      setStatus("Setting margin...", "muted");
      try {
        const res = await fetch("/api/margin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ symbol, marginType: type }),
        });
        const d = await res.json();
        const sukses = d.code === 200 || (d.msg && d.msg.toLowerCase().includes("no need"));
        if (sukses) setStatus("✅ Margin: " + (type === "CROSSED" ? "Cross" : "Isolated"), "green");
        else setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function syncMarginType() {
      const sym = document.getElementById("symbol").value.trim().toUpperCase();
      if (!sym) return;
      try {
        const res = await fetch("/api/margin-type?symbol=" + sym);
        const d = await res.json();
        if (d.marginType) {
          const val = d.marginType.toLowerCase() === "isolated" ? "ISOLATED" : "CROSSED";
          const sel = document.getElementById("marginSel");
          if (sel) sel.value = val;
        }
      } catch (e) {}
    }

        async function openPosisi(side) {
      const symbol = document.getElementById("symbol").value.trim().toUpperCase();
      const usdt = document.getElementById("usdt").value.trim();
      const leverage = document.getElementById("lev").value.trim();
      const tpPct = document.getElementById("tp").value.trim();
      const slPct = document.getElementById("sl").value.trim();
      const limitPrice = document.getElementById("limitPrice").value.trim();
      const positionSide = hedgeOn ? (side === "BUY" ? "LONG" : "SHORT") : null;
      const dir = side === "BUY" ? "LONG" : "SHORT";
      const notional = (Number(usdt) * Number(leverage)) || 0;

      if (orderType === "LIMIT" && (!Number(limitPrice) || Number(limitPrice) <= 0)) {
        setStatus("❌ Isi Limit Price dulu (angka > 0).", "red"); return;
      }

      // harga acuan TP/SL: limit → limitPrice, market → harga pasar
      let basePrice = 0;
      if (tpPct || slPct) {
        if (orderType === "LIMIT") {
          basePrice = Number(limitPrice);
        } else {
          setStatus("Calculating TP/SL...", "muted");
          try {
            const pr = await fetch("/api/price?symbol=" + symbol);
            const pd = await pr.json();
            basePrice = Number(pd.price);
          } catch (e) {}
          if (!basePrice) { setStatus("❌ Couldn't fetch price for TP/SL. Try again.", "red"); return; }
        }
      }
          
      let tpPrice = "", slPrice = "";
      if (tpPct) tpPrice = side === "BUY" ? basePrice * (1 + tpPct / 100) : basePrice * (1 - tpPct / 100);
      if (slPct) slPrice = side === "BUY" ? basePrice * (1 - slPct / 100) : basePrice * (1 + slPct / 100);

      let body = "";
      body += '<div class="mrow"><span>Direction</span><span class="' + (side === "BUY" ? "green" : "red") + '">' + dir + '</span></div>';
      body += '<div class="mrow"><span>Symbol</span><span>' + symbol + '</span></div>';
      body += '<div class="mrow"><span>Order type</span><span>' + orderType + (orderType === "LIMIT" ? " @ " + limitPrice : "") + '</span></div>';
      body += '<div class="mrow"><span>Margin</span><span>' + usdt + ' USDT × ' + leverage + 'x</span></div>';
      body += '<div class="mrow"><span>Est. size</span><span>~' + notional.toFixed(2) + ' USDT</span></div>';
          const avail = window._avail || 0;
          const pctAvail = avail > 0 ? (Number(usdt) / avail) * 100 : 0;
          if (pctAvail >= 50) {
            body += '<div class="mrow"><span>⚠️ Margin</span><span class="red">' + pctAvail.toFixed(0) + '% of available</span></div>';
          }
      body += '<div class="mrow"><span>Mode</span><span>' + (hedgeOn ? "Hedge" : "One-way") + '</span></div>';
      if (tpPrice) body += '<div class="mrow"><span>Take Profit</span><span class="green">+' + tpPct + '% → ~' + fmt(tpPrice) + '</span></div>';
      if (slPrice) body += '<div class="mrow"><span>Stop Loss</span><span class="red">-' + slPct + '% → ~' + fmt(slPrice) + '</span></div>';

      const ok = await customConfirm({
        title: "Open " + dir + " position?",
        bodyHtml: body,
        confirmText: dir,
        confirmClass: side === "BUY" ? "long" : "short",
      });
      if (!ok) { setStatus("Order cancelled.", "muted"); return; }

      setStatus("Sending order...", "muted");
      try {
        const res = await fetch("/api/order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            symbol, side, usdt, leverage,
            orderType,
            limitPrice: orderType === "LIMIT" ? limitPrice : "",
            tp: tpPrice ? String(tpPrice) : "",
            sl: slPrice ? String(slPrice) : "",
            positionSide,
          }),
        });
        const d = await res.json();
        if (d.orderId) {
          let msg = "✅ " + (d.type || "") + " order placed! ID: " + d.orderId;
          if (d.quantity) msg += " | Qty: " + d.quantity;
          if (d.leverage) msg += " | " + d.leverage + "x";
          if (d.extra && d.extra.length) msg += " | " + d.extra.join(", ");
          setStatus(msg, (d.extra && d.extra.some(x => x.includes("⚠️"))) ? "muted" : "green");
          muat();
        } else {
          setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function muatOrders() {
      try {
        const [r1, r2] = await Promise.all([
          fetch("/api/open-orders").then(r => r.json()),
          fetch("/api/algo-orders").then(r => r.json()),
        ]);
        const regular = r1.orders || [];
        const algos = r2.orders || [];
        const n = regular.length + algos.length;
        const c = document.getElementById("ordCount");
        if (c) c.textContent = n;

        const box = document.getElementById("orders");
        if (!box) return;
        if (r1.error && r2.error) { box.innerHTML = "<p class='red'>Error: " + (r1.error || r2.error) + "</p>"; return; }
        if (n === 0) { box.innerHTML = "<p class='muted'>No pending orders.</p>"; return; }

        let html = "";
        // limit entry orders
        html += regular.map(o => `
          <div class="pos">
            <div class="head">
              <span class="sym">${o.symbol}</span>
              <span class="tag ${o.side === 'BUY' ? 'long-tag' : 'short-tag'}">${o.side} ${o.type}</span>
            </div>
            <div class="row"><span>Price</span><span>${o.price ? fmt(o.price) : (o.stopPrice ? fmt(o.stopPrice) : '-')}</span></div>
            <div class="row"><span>Qty</span><span>${o.qty}</span></div>
            ${o.positionSide && o.positionSide !== 'BOTH' ? `<div class="row"><span>Position</span><span>${o.positionSide}</span></div>` : ``}
            <button class="closebtn" onclick="cancelOrder('${o.symbol}','${o.orderId}')">Cancel order</button>
          </div>
        `).join("");
        // TP/SL conditional orders
        html += algos.map(o => {
          const isTP = (o.orderType || "").includes("TAKE_PROFIT");
          const label = isTP ? "TP" : "SL";
          const tagClass = isTP ? "long-tag" : "short-tag";
          return `
            <div class="pos">
              <div class="head">
                <span class="sym">${o.symbol}</span>
                <span class="tag ${tagClass}">${label}${o.closePosition ? " · Close" : ""}</span>
              </div>
              <div class="row"><span>Trigger</span><span>${fmt(o.triggerPrice)}</span></div>
              ${o.positionSide && o.positionSide !== 'BOTH' ? `<div class="row"><span>Position</span><span>${o.positionSide}</span></div>` : ``}
              <button class="closebtn" onclick="cancelAlgo('${o.algoId}')">Cancel ${label}</button>
            </div>`;
        }).join("");
        box.innerHTML = html;
      } catch (e) {
        const box = document.getElementById("orders");
        if (box) box.innerHTML = "<p class='red'>Failed: " + e.message + "</p>";
      }
    }

    async function cancelAllOrders() {
      const ok = await customConfirm({
        title: "Cancel ALL pending orders?",
        bodyHtml:
          '<div class="mrow"><span>This cancels</span><span>ALL limit + TP/SL</span></div>' +
          '<div class="mrow"><span>⚠️ Warning</span><span class="red">stops on positions too</span></div>',
        confirmText: "Cancel All",
        confirmClass: "short",
      });
      if (!ok) return;
      setStatus("Cancelling all orders...", "muted");
      try {
        const res = await fetch("/api/cancel-all-orders", { method: "POST" });
        const d = await res.json();
        if (d.ok) {
          setStatus("✅ Cancelled " + d.cancelled + (d.failed ? " (" + d.failed + " failed)" : "") + " orders", d.failed ? "muted" : "green");
          muatOrders();
        } else {
          setStatus("❌ " + (d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function cancelOrder(symbol, orderId) {
      const ok = await customConfirm({
        title: "Cancel this order?",
        bodyHtml: '<div class="mrow"><span>Symbol</span><span>' + symbol + '</span></div><div class="mrow"><span>Order ID</span><span>' + orderId + '</span></div>',
        confirmText: "Cancel order",
        confirmClass: "short",
      });
      if (!ok) return;
      setStatus("Cancelling order...", "muted");
      try {
        const res = await fetch("/api/cancel-order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ symbol, orderId }),
        });
        const d = await res.json();
        if (d.orderId || d.status === "CANCELED") {
          setStatus("✅ Order cancelled.", "green");
          muatOrders();
        } else {
          setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function cancelAlgo(algoId) {
      const ok = await customConfirm({
        title: "Cancel this TP/SL?",
        bodyHtml: '<div class="mrow"><span>Algo ID</span><span>' + algoId + '</span></div>',
        confirmText: "Cancel",
        confirmClass: "short",
      });
      if (!ok) return;
      setStatus("Cancelling...", "muted");
      try {
        const res = await fetch("/api/cancel-algo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ algoId }),
        });
        const d = await res.json();
        if (d.code === "200" || d.code === 200 || d.algoId) {
          setStatus("✅ TP/SL cancelled.", "green");
          muatOrders();
        } else {
          setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function setStop(symbol, positionSide, kind) {
      const el = document.getElementById("stop_" + symbol + "_" + positionSide);
      const triggerPrice = el ? el.value.trim() : "";
      if (!Number(triggerPrice) || Number(triggerPrice) <= 0) {
        setStatus("❌ Isi trigger price dulu (angka > 0).", "red"); return;
      }
      const ok = await customConfirm({
        title: "Set " + kind + " for " + symbol + "?",
        bodyHtml:
          '<div class="mrow"><span>Symbol</span><span>' + symbol + '</span></div>' +
          '<div class="mrow"><span>Type</span><span>' + (kind === "TP" ? "Take Profit" : "Stop Loss") + '</span></div>' +
          '<div class="mrow"><span>Trigger</span><span>' + triggerPrice + '</span></div>' +
          '<div class="mrow"><span>Note</span><span>Replaces existing ' + kind + '</span></div>',
        confirmText: "Set " + kind,
        confirmClass: kind === "TP" ? "long" : "short",
      });
      if (!ok) return;
      setStatus("Setting " + kind + "...", "muted");
      try {
        const res = await fetch("/api/set-stop", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ symbol, positionSide, kind, triggerPrice }),
        });
        const d = await res.json();
        if (d.ok || d.algoId) {
          let msg = "✅ " + kind + " set @ " + (d.trigger || triggerPrice);
          if (d.replaced) msg += " (replaced " + d.replaced + " old)";
          setStatus(msg, "green");
          muatOrders();
        } else {
          setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function closePartial(symbol, positionSide, percent) {
      const ok = await customConfirm({
        title: "Close " + percent + "% of " + symbol + "?",
        bodyHtml:
          '<div class="mrow"><span>Symbol</span><span>' + symbol + '</span></div>' +
          '<div class="mrow"><span>Close</span><span>' + percent + '% (market)</span></div>',
        confirmText: "Close " + percent + "%",
        confirmClass: "short",
      });
      if (!ok) return;
      setStatus("Closing " + percent + "%...", "muted");
      try {
        const res = await fetch("/api/close-partial", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ symbol, positionSide, percent }),
        });
        const d = await res.json();
        if (d.ok || d.orderId) {
          setStatus("✅ Closed " + percent + "% (qty " + d.qty + ")", "green");
          muat();
        } else {
          setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }
    
    async function closePos(symbol, positionSide) {
      setStatus("Closing " + symbol + " " + positionSide + "...", "muted");
      try {
        const res = await fetch("/api/close", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ symbol, positionSide }),
        });
        const d = await res.json();
        if (d.orderId) {
          setStatus("✅ Closed " + symbol + " " + positionSide, "green");
          muat();
        } else {
          setStatus("❌ " + (d.msg || d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function closeAll() {
      const ok = await customConfirm({
        title: "Close all positions?",
        bodyHtml: '<div class="mrow"><span>This closes</span><span>ALL open positions</span></div><div class="mrow"><span>Order type</span><span>Market</span></div>',
        confirmText: "Close All",
        confirmClass: "short",
      });
      if (!ok) return;
      setStatus("Closing all positions...", "muted");
      try {
        const res = await fetch("/api/close-all", { method: "POST" });
        const d = await res.json();
        if (d.closed) {
          const okc = d.closed.filter(c => c.ok).length;
          setStatus("✅ Closed " + okc + "/" + d.closed.length + " positions", okc > 0 ? "green" : "red");
          muat();
        } else {
          setStatus("❌ " + (d.error || JSON.stringify(d)), "red");
        }
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function testTelegram() {
      setStatus("Sending test to Telegram...", "muted");
      try {
        const res = await fetch("/api/test-telegram", { method: "POST" });
        const d = await res.json();
        if (d.ok) setStatus("✅ Sent! Check your Telegram.", "green");
        else setStatus("❌ " + d.error, "red");
      } catch (e) { setStatus("❌ " + e.message, "red"); }
    }

    async function muat() {
      try {
        const res = await fetch("/api/data");
        const d = await res.json();
        if (d.error) {
          document.getElementById("positions").innerHTML = "<p class='red'>Error: " + d.error + "</p>";
          return;
        }
        document.getElementById("margin").textContent = fmt(d.marginBalance) + " USDT";
        const u = document.getElementById("upnl");
        u.textContent = (d.unrealizedPnl >= 0 ? "+" : "") + fmt(d.unrealizedPnl) + " USDT";
        u.className = "val " + warna(d.unrealizedPnl);
        document.getElementById("avail").textContent = fmt(d.availableBalance) + " USDT";
        window._avail = d.availableBalance;

        const pc = document.getElementById("posCount");
        if (pc) pc.textContent = d.positions.length;

        // jangan render ulang kartu kalau lagi ngetik trigger (biar input gak kehapus tiap 2 detik)
        const active = document.activeElement;
        if (active && active.classList && active.classList.contains("stopinput")) return;

        const box = document.getElementById("positions");
        if (d.positions.length === 0) {
          box.innerHTML = "<p class='muted'>No open positions.</p>";
          return;
        }
        box.innerHTML = d.positions.map(p => `
          <div class="pos">
            <div class="head">
              <span class="sym">${p.symbol}</span>
              <span class="tag ${p.side === 'LONG' ? 'long-tag' : 'short-tag'}">${p.side} ${p.leverage}x</span>
            </div>
            <div class="row"><span>Size</span><span>${p.size} (${p.marginType})</span></div>
            <div class="row"><span>Margin Used</span><span>${fmt(p.margin)} USDT</span></div>
            <div class="row"><span>Margin Ratio</span><span class="${warnaRatio(p.marginRatio)}">${p.marginRatio == null ? '-' : fmt(p.marginRatio) + '%'}</span></div>
            <div class="row"><span>Entry / Mark</span><span>${fmt(p.entryPrice)} / ${fmt(p.markPrice)}</span></div>
            <div class="row"><span>PNL</span><span class="${warna(p.pnl)}">${p.pnl >= 0 ? '+' : ''}${fmt(p.pnl)} USDT</span></div>
            <div class="row"><span>ROI</span><span class="${warna(p.roi)}">${p.roi >= 0 ? '+' : ''}${fmt(p.roi)}%</span></div>
            <div class="row"><span>Liq. Price</span><span>${Number(p.liqPrice) > 0 ? fmt(p.liqPrice) : '-'}</span></div>
            <div class="partialrow">
              <button class="pbtn" onclick="closePartial('${p.symbol}','${p.positionSide}',25)">Close 25%</button>
              <button class="pbtn" onclick="closePartial('${p.symbol}','${p.positionSide}',50)">Close 50%</button>
              <button class="pbtn" onclick="closePartial('${p.symbol}','${p.positionSide}',75)">Close 75%</button>
            </div>
            <div class="stoprow">
              <input class="stopinput" id="stop_${p.symbol}_${p.positionSide}" placeholder="Trigger price" inputmode="decimal" />
              <button class="stopbtn tp" onclick="setStop('${p.symbol}','${p.positionSide}','TP')">Set TP</button>
              <button class="stopbtn sl" onclick="setStop('${p.symbol}','${p.positionSide}','SL')">Set SL</button>
            </div>
            <button class="closebtn" onclick="closePos('${p.symbol}','${p.positionSide}')">Close ${p.side}</button>
          </div>
        `).join("");
      } catch (e) {
        document.getElementById("positions").innerHTML = "<p class='red'>Failed: " + e.message + "</p>";
      }
    }

    let _pollStarted = false;
    function startApp() {
      document.getElementById("loginOverlay").classList.remove("show");
      loadMode();
      muat();
      muatOrders();
      refreshSymPrice();
      syncMarginType();
      if (!_pollStarted) {
        _pollStarted = true;
        setInterval(muat, 2000);
        setInterval(muatOrders, 5000);
        setInterval(refreshSymPrice, 3000);
      }
    }

    // gerbang awal: ada token → langsung jalan; gak ada → tetap di layar login
    if (sessionStorage.getItem("appToken")) startApp();
    else showLogin();
  </script>
</body>
</html>
